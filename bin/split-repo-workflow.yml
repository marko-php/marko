name: Close Pull Requests

on:
  pull_request_target:
    types: [opened]

permissions:
  pull-requests: write

jobs:
  close:
    runs-on: ubuntu-latest
    steps:
      - name: Close PR with redirect
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `Thanks for your interest in contributing! This repository is a **read-only** subtree split of [marko-php/marko](https://github.com/marko-php/marko) and does not accept pull requests.\n\nPlease submit your PR against the main monorepo instead:\n**https://github.com/marko-php/marko**`
            });
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              state: 'closed'
            });
