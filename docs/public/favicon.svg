<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 8 8" width="512" height="512" shape-rendering="crispEdges">
  <!-- Row 1: M pillars -->
  <rect x="1" y="1" width="1" height="1" fill="#3498db"/>
  <rect x="6" y="1" width="1" height="1" fill="#3498db"/>
  <!-- Row 2: M with inner highlights -->
  <rect x="1" y="2" width="1" height="1" fill="#3498db"/>
  <rect x="2" y="2" width="1" height="1" fill="#7ec8e3"/>
  <rect x="5" y="2" width="1" height="1" fill="#7ec8e3"/>
  <rect x="6" y="2" width="1" height="1" fill="#3498db"/>
  <!-- Row 3: M crossing -->
  <rect x="1" y="3" width="1" height="1" fill="#3498db"/>
  <rect x="2" y="3" width="1" height="1" fill="#3498db"/>
  <rect x="3" y="3" width="1" height="1" fill="#7ec8e3"/>
  <rect x="4" y="3" width="1" height="1" fill="#7ec8e3"/>
  <rect x="5" y="3" width="1" height="1" fill="#3498db"/>
  <rect x="6" y="3" width="1" height="1" fill="#3498db"/>
  <!-- Row 4: M center -->
  <rect x="1" y="4" width="1" height="1" fill="#3498db"/>
  <rect x="3" y="4" width="1" height="1" fill="#3498db"/>
  <rect x="4" y="4" width="1" height="1" fill="#3498db"/>
  <rect x="6" y="4" width="1" height="1" fill="#3498db"/>
  <!-- Row 5-6: M legs -->
  <rect x="1" y="5" width="1" height="1" fill="#3498db"/>
  <rect x="6" y="5" width="1" height="1" fill="#3498db"/>
  <rect x="1" y="6" width="1" height="1" fill="#3498db"/>
  <rect x="6" y="6" width="1" height="1" fill="#3498db"/>
</svg>
