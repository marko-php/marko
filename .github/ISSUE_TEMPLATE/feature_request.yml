name: Feature Request
description: Suggest a new feature or improvement for the Marko framework
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or features you've considered.
    validations:
      required: false

  - type: dropdown
    id: package
    attributes:
      label: Package
      description: Which package does this relate to?
      options:
        - admin
        - admin-api
        - admin-auth
        - admin-panel
        - amphp
        - api
        - authentication
        - authentication-token
        - authorization
        - blog
        - cache
        - cache-array
        - cache-file
        - cache-redis
        - cli
        - config
        - core
        - cors
        - database
        - database-mysql
        - database-pgsql
        - dev-server
        - encryption
        - encryption-openssl
        - env
        - errors
        - errors-advanced
        - errors-simple
        - filesystem
        - filesystem-local
        - filesystem-s3
        - framework
        - hashing
        - health
        - http
        - http-guzzle
        - log
        - log-file
        - mail
        - mail-log
        - mail-smtp
        - media
        - media-gd
        - media-imagick
        - notification
        - notification-database
        - pagination
        - pubsub
        - pubsub-pgsql
        - pubsub-redis
        - queue
        - queue-database
        - queue-rabbitmq
        - queue-sync
        - rate-limiting
        - routing
        - scheduler
        - search
        - security
        - session
        - session-database
        - session-file
        - skeleton
        - sse
        - testing
        - translation
        - translation-file
        - validation
        - view
        - view-latte
        - webhook
        - Other
    validations:
      required: true
