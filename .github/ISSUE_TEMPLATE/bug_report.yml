name: Bug Report
description: Report a bug in the Marko framework
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true

  - type: dropdown
    id: package
    attributes:
      label: Package
      description: Which package is affected?
      options:
    validations:
      required: true

  - type: input
    id: php_version
    attributes:
      label: PHP Version
      placeholder: "e.g. 8.5.1"
    validations:
      required: true

  - type: input
    id: marko_version
    attributes:
      label: Marko Version
      placeholder: "e.g. 1.0.0"
    validations:
      required: true
