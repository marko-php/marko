changelog:
  exclude:
    labels:
      - duplicate
      - invalid
      - wontfix
      - question
      - good first issue
      - help wanted
  categories:
    - title: Breaking Changes
      labels:
        - breaking
    - title: New Features
      labels:
        - enhancement
    - title: Bug Fixes
      labels:
        - bug
    - title: Documentation
      labels:
        - documentation
    - title: Refactoring
      labels:
        - refactor
    - title: Testing
      labels:
        - testing
    - title: CI
      labels:
        - ci
    - title: Maintenance
      labels:
        - maintenance
